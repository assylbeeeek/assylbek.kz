<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assylbek</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .content {
      font-size: 6vw; /* адаптивный размер шрифта */
      padding: 20px;
    }

    @media (max-width: 768px) {
      .content {
        font-size: 8vw;
      }
    }

    @media (max-width: 480px) {
      .content {
        font-size: 10vw;
      }
    }

    details {
      font-size: 1.5em;
      margin-top: 20px;
      cursor: pointer;
    }

    summary {
/*       font-weight: bold; */
      color: #333;
    }

    .hidden-content {
      padding: 10px;
      background-color: #e6e6e6;
      border: 1px solid #ccc;
      margin-top: 10px;
      border-radius: 5px;
      font-size: 1.5em;
    }
  </style>
</head>
<body>
  <div class="content">
    Привет! 👋 Я Асылбек<br />
    Добро пожаловать на мой сайт!

    <!-- Скрытый текст -->
    <details>
      <summary class="content">Нажми, чтобы увидеть что-то интересное!</summary>
      <div class="hidden-content">
        Арыстан қотақбас
      </div>
    </details>
  </div>
</body>
</html>
